# ============================================================
# Ansible Inventory — Local Docker Desktop Kubernetes
# ============================================================
# For a student setup using Docker Desktop, the "bastion" is
# simply your local machine. This inventory reflects that.
# ============================================================
[local]
localhost ansible_connection=local

[local:vars]
ansible_python_interpreter=/usr/bin/python3
kubectl_version=1.31
helm_version=3.16
