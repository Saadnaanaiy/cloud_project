# ============================================================
# Prometheus Custom Values for kube-prometheus-stack
# ============================================================
# Lightweight config optimized for Docker Desktop K8s.
# Install with:
#   helm install monitoring prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     -f monitoring/values.yaml
# ============================================================

# ─── Grafana ───────────────────────────────────────────────
grafana:
  adminPassword: admin123
  service:
    type: NodePort
    nodePort: 30300
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

# ─── Prometheus ────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # Reduce resource usage for Docker Desktop
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

# ─── AlertManager ──────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

# ─── Node Exporter (lightweight) ──────────────────────────
nodeExporter:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# ─── Kube State Metrics ───────────────────────────────────
kubeStateMetrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# ─── Custom Alert Rules ────────────────────────────────────
additionalPrometheusRulesMap:
  employee-platform-alerts:
    groups:
      - name: employee-platform
        rules:
          - alert: BackendHigh5xxRate
            expr: |
              sum(rate(nginx_ingress_controller_requests{namespace="employee-platform",status=~"5..",host="api.employee-platform.example"}[5m]))
              /
              sum(rate(nginx_ingress_controller_requests{namespace="employee-platform",host="api.employee-platform.example"}[5m])) > 0.05
            for: 10m
            labels:
              severity: warning
              service: backend
            annotations:
              summary: "Backend 5xx error ratio is above 5%"
              description: "The API ingress is returning too many server errors for 10 minutes."

          - alert: PodCrashLooping
            expr: max_over_time(kube_pod_container_status_waiting_reason{namespace="employee-platform",reason="CrashLoopBackOff"}[5m]) > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "CrashLoopBackOff detected"
              description: "One or more containers in employee-platform are crash-looping."

          - alert: NodeHighCPU
            expr: 100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Node CPU usage is above 85%"
              description: "A Kubernetes node has sustained high CPU usage for 10 minutes."
