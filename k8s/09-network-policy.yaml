# ============================================================
# Network Policy — Restrict traffic between pods
# ============================================================
# Rules:
#   - MySQL: only accepts traffic from backend pods
#   - Backend: accepts traffic from frontend and external
#   - Frontend: accepts traffic from anywhere (public)
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mysql-allow-backend-only
  namespace: employee-platform
spec:
  podSelector:
    matchLabels:
      app: mysql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - protocol: TCP
          port: 3306
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-allow-frontend
  namespace: employee-platform
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from frontend pods
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 3001
    # Allow traffic from NodePort (external browser requests)
    - ports:
        - protocol: TCP
          port: 3001
