# ============================================================
# Backend External Service — Expose API publicly
# ============================================================
# In GKE this LoadBalancer receives a public external IP.
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: backend-external
  namespace: employee-platform
  labels:
    app: backend
    app.kubernetes.io/part-of: employee-platform
spec:
  type: LoadBalancer
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 3001
      protocol: TCP
      name: http
