# ============================================================
# Frontend (React/Nginx) — Deployment + Service
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: employee-platform
  labels:
    app: frontend
    app.kubernetes.io/part-of: employee-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Local image — built with:
          # docker build -t employee-platform/frontend:latest --build-arg VITE_API_URL=http://localhost:30001 ./frontend
          image: employee-platform/frontend:latest
          imagePullPolicy: Never   # Use locally-built image (Docker Desktop)
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: employee-platform
  labels:
    app: frontend
    app.kubernetes.io/part-of: employee-platform
spec:
  # LoadBalancer automatically maps to localhost in Docker Desktop
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 30080
      targetPort: 80
      protocol: TCP
      name: http
