# ============================================================
# Backend (NestJS) — Deployment + Service
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: employee-platform
  labels:
    app: backend
    app.kubernetes.io/part-of: employee-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # GKE image from Artifact Registry
          image: europe-west1-docker.pkg.dev/cloudappproject-494314/dev-employee-platform/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: employee-platform-config
          env:
            - name: DB_USERNAME
              value: "employee_user"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: employee-platform-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: employee-platform-secret
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: employee-platform
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "backend-config"}'
  labels:
    app: backend
    app.kubernetes.io/part-of: employee-platform
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
      name: http
