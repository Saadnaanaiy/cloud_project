# ============================================================
# HorizontalPodAutoscaler — Auto-scale backend pods
# ============================================================
# Requires metrics-server to be installed.
# Docker Desktop includes metrics-server by default.
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: employee-platform
  labels:
    app: backend
    app.kubernetes.io/part-of: employee-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
